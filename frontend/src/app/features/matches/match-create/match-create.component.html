      <label>
        Fecha del partido
        <input type="date" formControlName="playedAt" />
      </label>

      <fieldset class="format-fieldset">
        <legend>Jugadores por equipo</legend>
        <p class="format-hint">Cualquier número entre {{ playersMin }} y {{ playersMax }} (ej. 8 vs 8)</p>

        <div class="format-presets">
          @for (n of presets; track n) {
            <button
              type="button"
              class="preset-btn"
              [class.active]="form.controls.playersPerTeam.value === n"
              (click)="setPreset(n)"
            >
              {{ n }} vs {{ n }}
            </button>
          }
        </div>

        <label class="format-input">
          Cantidad por equipo
          <input
            type="number"
            formControlName="playersPerTeam"
            [min]="playersMin"
            [max]="playersMax"
            step="1"
          />
        </label>
        <p class="format-preview">{{ formatPreview() }}</p>
      </fieldset>
