<div class="card form-card fade-in">
  <h2>{{ player ? 'Editar jugador' : 'Nuevo jugador' }}</h2>
  <p class="form-intro">
    El apodo es el nombre en la cancha. La foto sale del perfil del usuario vinculado (Mi perfil).
  </p>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-grid">
      <label>
        Apodo / alias
        <input type="text" formControlName="name" placeholder="El Tucu, Pipita…" />
      </label>
      <label>
        Posición
        <select formControlName="defaultPosition">
          @for (pos of positions; track pos) {
            <option [value]="pos">{{ pos.replace('_', ' ') }}</option>
          }
        </select>
      </label>
    </div>

    <label class="link-label">
      Vincular con usuario del grupo
      <select formControlName="userId">
        <option value="">Sin vincular (invitado de un partido)</option>
        @for (member of availableMembers; track member.userId) {
          <option [value]="member.userId">
            {{ member.displayName }} ({{ member.email }})
          </option>
        }
      </select>
      <span class="hint">Sin cuenta: podés crearlo para un partido y borrarlo después.</span>
    </label>

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <div class="form-actions">
      <button type="button" class="btn-ghost" (click)="cancelled.emit()">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="loading || form.invalid">
        {{ loading ? 'Guardando…' : 'Guardar' }}
      </button>
    </div>
  </form>
</div>
