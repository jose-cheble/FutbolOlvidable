@if (currentUser$ | async; as user) {
  <header class="app-nav">
    <a routerLink="/groups" class="brand">Futbol Olvidable</a>
    <nav class="nav-links">
      <a routerLink="/groups" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }">Mis Grupos</a>
    </nav>
    <div class="nav-user">
      <a routerLink="/profile" routerLinkActive="active" class="user-link">
        @if (user.photoUrl) {
          <img [src]="user.photoUrl" alt="" class="nav-avatar" />
        }
        <span class="user-name">{{ user.displayName }}</span>
      </a>
      <button type="button" class="btn-ghost btn-sm" (click)="logout()">Salir</button>
    </div>
  </header>
}

<main class="app-main" [class.with-nav]="(currentUser$ | async)">
  <router-outlet />
</main>
