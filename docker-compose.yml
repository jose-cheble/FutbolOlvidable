services:
  postgres:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-futbol_olvidable}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-futbol_olvidable}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-futbol_olvidable}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOAD_PATH: /app/uploads
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-5}
      UPLOAD_WEBP_QUALITY: ${UPLOAD_WEBP_QUALITY:-80}
      UPLOAD_MAX_WIDTH: ${UPLOAD_MAX_WIDTH:-800}
      UPLOAD_MAX_HEIGHT: ${UPLOAD_MAX_HEIGHT:-800}
      PORT: 3000
      NODE_ENV: development
      RUN_SEED: ${RUN_SEED:-true}
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    depends_on:
      - api

  nginx:
    build: ./nginx
    depends_on:
      - frontend
      - api
    ports:
      - "80:80"
    volumes:
      - uploads:/var/www/uploads:ro

volumes:
  pgdata:
  uploads:
